---
apiVersion: v1
kind: ConfigMap
metadata:
  name: viewer-config
data:
  # Hier zet je naar welke HLS-endpoint de viewer moet wijzen.
  # Kan een interne service-DNS zijn als alles in hetzelfde cluster draait,
  # maar voor browser-toegang wijs je naar de publieke Ingress-host.
  STREAM_URL: "https://stream.jouwdomein.nl/stream.m3u8"
  PAGE_TITLE: "Live Stream"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: viewer
  labels:
    app.kubernetes.io/name: viewer
    app.kubernetes.io/component: frontend
spec:
  replicas: 2                # frontend is stateless — gerust schalen
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: viewer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: viewer
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: viewer
          image: ghcr.io/JOUW_GEBRUIKERSNAAM/livestream-platform-viewer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: viewer-config
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: { cpu: "10m",  memory: "16Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }

---
apiVersion: v1
kind: Service
metadata:
  name: viewer
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: viewer
  ports:
    - name: http
      port: 80
      targetPort: http

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: viewer
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - kijk.jouwdomein.nl
      secretName: viewer-tls
  rules:
    - host: kijk.jouwdomein.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: viewer
                port:
                  number: 80
